    :root { --gold:#FFD93D; --coral:#FF6B6B; --mint:#6BCB77; --sky:#4D96FF; --bg:#FFF8ED; --text:#2D2D2D; --sub:#777; --card:#FFFFFF; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .top-bar { background:linear-gradient(135deg,#FFD93D,#FF6B6B); padding:18px 20px; display:flex; align-items:center; gap:14px; }
    .back-btn { text-decoration:none; background:rgba(255,255,255,.3); border-radius:50px; padding:6px 14px; font-weight:700; font-family:'Nunito',sans-serif; color:#fff; font-size:.9rem; white-space:nowrap; }
    .top-bar-title { font-family:'Nunito',sans-serif; font-weight:900; color:#fff; font-size:1.1rem; text-shadow:0 1px 0 rgba(0,0,0,.1); }
    .teacher-hero { text-align:center; padding:36px 20px 28px; }
    .teacher-avatar { width:110px; height:110px; border-radius:50%; background:#FFF0C2; display:flex; align-items:center; justify-content:center; font-size:3.5rem; margin:0 auto 16px; border:5px solid var(--gold); box-shadow:0 6px 0 rgba(0,0,0,.08); }
    .teacher-name { font-family:'Nunito',sans-serif; font-size:clamp(1.6rem,5vw,2.2rem); font-weight:900; }
    .teacher-class { color:var(--sub); font-weight:600; font-size:1rem; margin-top:4px; }
    .teacher-tagline { margin-top:14px; font-size:1.05rem; color:var(--coral); font-weight:700; }
    .section-label { text-align:center; font-family:'Nunito',sans-serif; font-weight:900; font-size:1.15rem; color:var(--text); padding:0 20px 16px; }
    .page-wrap { max-width:600px; margin:0 auto; padding:0 16px; }
    .form-card { background:var(--card); border-radius:20px; padding:24px; margin-bottom:28px; box-shadow:0 4px 0 rgba(0,0,0,.06); border:2px solid #F0E8D8; }
    .form-card h3 { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.1rem; margin-bottom:16px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-weight:700; font-size:.88rem; color:var(--sub); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
    .form-group input, .form-group textarea { width:100%; padding:12px 16px; border:2px solid #E8E0D0; border-radius:12px; font-size:1rem; font-family:'Nunito Sans',sans-serif; outline:none; color:var(--text); background:#FAFAFA; transition:border-color .2s; resize:vertical; }
    .form-group input:focus, .form-group textarea:focus { border-color:var(--gold); background:#fff; }
    .form-group textarea { min-height:100px; }
    .email-hint { font-size:.8rem; color:var(--sub); margin-top:5px; }
    .submit-btn { width:100%; padding:14px; background:var(--coral); color:#fff; border:none; border-radius:50px; font-size:1.05rem; font-family:'Nunito',sans-serif; font-weight:900; cursor:pointer; box-shadow:0 4px 0 #c94c4c; transition:transform .1s,box-shadow .1s; margin-top:4px; }
    .submit-btn:hover { transform:translateY(-2px); box-shadow:0 6px 0 #c94c4c; }
    .submit-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #c94c4c; }
    .submit-btn:disabled { background:#ccc; box-shadow:0 4px 0 #aaa; cursor:not-allowed; transform:none; }
    .status-msg { text-align:center; margin-top:12px; font-weight:700; font-size:.95rem; min-height:22px; }
    .status-msg.success { color:var(--mint); }
    .status-msg.error { color:var(--coral); }
    .comments-section { max-width:600px; margin:0 auto; padding:0 16px 60px; }
    .comments-wall { display:flex; flex-direction:column; gap:14px; max-height:520px; overflow-y:auto; padding:4px 2px 4px 0; scrollbar-width:thin; scrollbar-color:var(--gold) transparent; }
    .comments-wall::-webkit-scrollbar { width:6px; }
    .comments-wall::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; }
    .comment-bubble { background:var(--card); border-radius:16px; padding:16px 18px; box-shadow:0 3px 0 rgba(0,0,0,.05); border-left:4px solid var(--gold); animation:popIn .3s ease; }
    @keyframes popIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .comment-bubble:nth-child(4n+2) { border-color:var(--coral); }
    .comment-bubble:nth-child(4n+3) { border-color:var(--mint); }
    .comment-bubble:nth-child(4n+4) { border-color:var(--sky); }
    .comment-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .comment-author { font-family:'Nunito',sans-serif; font-weight:900; font-size:.95rem; }
    .comment-time { font-size:.75rem; color:var(--sub); }
    .comment-text { font-size:.97rem; line-height:1.55; color:var(--text); }
    .no-comments { text-align:center; color:var(--sub); padding:30px 0; font-size:1rem; }
    .not-found { text-align:center; padding:60px 20px; }
    .not-found h2 { font-family:'Nunito',sans-serif; font-size:1.8rem; font-weight:900; margin-bottom:12px; }
  </style>
</head>

  const btn     = document.getElementById('submitBtn');

  if (!name)    { showStatus('Please enter your name 😊','error'); return; }
  if (!email)   { showStatus('Please enter your school email 📧','error'); return; }
  if (!isValidEmail(email)) { showStatus('Only @nps.edu.sg emails are allowed 🔒','error'); return; }
  if (!message) { showStatus('Please write a message for your teacher! ✏️','error'); return; }

  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showStatus('✅ Message sent! (Connect Google Sheets to save permanently)','success');
    addCommentToWall({ name, message, time: new Date().toISOString() }, true);
    document.getElementById('authorName').value = '';
    document.getElementById('messageText').value = '';
    return;
  }

  btn.disabled = true; btn.textContent = 'Sending… 💌';
  try {
    await fetch(APPS_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'post', teacherId:teacher.id, name, email, message }) });
    showStatus('🎉 Your message has been sent!','success');
    document.getElementById('authorName').value = '';
    document.getElementById('messageText').value = '';
    addCommentToWall({ name, message, time: new Date().toISOString() }, true);
  } catch(e) {
    showStatus('Something went wrong. Please try again 😓','error');
  } finally {
    btn.disabled = false; btn.textContent = 'Send my message 💌';
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg; el.className = 'status-msg ' + type;
}

async function loadComments() {
  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=get&teacherId=${teacher.id}`);
    const data = await res.json();
    const wall = document.getElementById('commentsWall');
    if (!wall) return;
    wall.innerHTML = '';
    if (!data.comments || !data.comments.length) {
      wall.innerHTML = '<div class="no-comments">No messages yet — be the first! 🌟</div>';
    } else {
      data.comments.forEach(c => addCommentToWall(c, false));
    }
  } catch(e) {}
}

function addCommentToWall(comment, prepend) {
  const wall = document.getElementById('commentsWall');
  if (!wall) return;
  const noMsg = wall.querySelector('.no-comments');
  if (noMsg) noMsg.remove();
  const date = comment.time ? new Date(comment.time).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'}) : 'Just now';
  const div = document.createElement('div');
  div.className = 'comment-bubble';
  div.innerHTML = `
    <div class="comment-meta">
      <div class="comment-author">💛 ${escH(comment.name)}</div>
      <div class="comment-time">${date}</div>
    </div>
    <div class="comment-text">${escH(comment.message)}</div>`;
  if (prepend) wall.prepend(div); else wall.appendChild(div);
}
</script>
