  <style>
    :root { --gold:#FFD93D; --coral:#FF6B6B; --mint:#6BCB77; --sky:#4D96FF; --purple:#C77DFF; --bg:#FFF8ED; --card:#FFFFFF; --text:#2D2D2D; --sub:#666; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .hero { background:linear-gradient(135deg,#FFD93D 0%,#FF6B6B 50%,#C77DFF 100%); padding:40px 20px 50px; text-align:center; position:relative; overflow:hidden; }
    .hero::before { content:"⭐🌸⭐🌸⭐🌸⭐🌸⭐🌸⭐"; position:absolute; top:8px; left:0; right:0; font-size:20px; letter-spacing:4px; opacity:.35; }
    .hero h1 { font-family:'Nunito',sans-serif; font-size:clamp(2rem,6vw,3.5rem); font-weight:900; color:#fff; text-shadow:0 3px 0 rgba(0,0,0,.15); line-height:1.15; }
    .hero p { margin-top:12px; font-size:clamp(1rem,3vw,1.25rem); color:rgba(255,255,255,.92); font-weight:600; }
    .wave { display:block; width:100%; height:48px; background:var(--bg); clip-path:ellipse(55% 100% at 50% 100%); margin-top:-2px; }
    .instruction { text-align:center; padding:6px 20px 24px; font-size:clamp(1rem,3vw,1.15rem); color:var(--sub); font-weight:600; }
    .instruction strong { color:var(--coral); }
    .search-wrap { max-width:480px; margin:0 auto 28px; padding:0 16px; }
    .search-wrap input { width:100%; padding:14px 20px; font-size:1.1rem; font-family:'Nunito Sans',sans-serif; border:3px solid var(--gold); border-radius:50px; outline:none; background:#fff; color:var(--text); transition:border-color .2s; }
    .search-wrap input:focus { border-color:var(--coral); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px; max-width:960px; margin:0 auto; padding:0 16px 60px; }
    .card { background:var(--card); border-radius:20px; padding:24px 12px 20px; text-align:center; cursor:pointer; text-decoration:none; color:inherit; box-shadow:0 4px 0 rgba(0,0,0,.07); border:3px solid transparent; transition:transform .15s,border-color .15s,box-shadow .15s; display:flex; flex-direction:column; align-items:center; gap:10px; }
    .card:hover,.card:focus { transform:translateY(-5px); border-color:var(--gold); box-shadow:0 8px 0 rgba(0,0,0,.1); outline:none; }
    .card:active { transform:translateY(-2px); }
    .card-emoji { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.2rem; }
    .card:nth-child(5n+1) .card-emoji { background:#FFF0C2; }
    .card:nth-child(5n+2) .card-emoji { background:#FFE0E0; }
    .card:nth-child(5n+3) .card-emoji { background:#D6F5DA; }
    .card:nth-child(5n+4) .card-emoji { background:#D6E8FF; }
    .card:nth-child(5n+5) .card-emoji { background:#EDD6FF; }
    .card-name { font-family:'Nunito',sans-serif; font-weight:900; font-size:.95rem; line-height:1.2; }
    .card-class { font-size:.78rem; color:var(--sub); font-weight:600; }
    .card-btn { margin-top:4px; padding:6px 14px; border-radius:50px; background:var(--gold); font-size:.78rem; font-family:'Nunito',sans-serif; font-weight:700; color:#333; }
    .empty { text-align:center; padding:40px; color:var(--sub); font-size:1.1rem; display:none; }
    footer { text-align:center; padding:20px; font-size:.85rem; color:#aaa; }
  </style>
</head>

const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const search = document.getElementById('search');

function render(list) {
  grid.innerHTML = '';
  if (!list.length) { empty.style.display='block'; return; }
  empty.style.display='none';
  list.forEach(t => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = 'teacher.html?id=' + t.id;
    a.innerHTML = `
      <div class="card-emoji">${t.emoji}</div>
      <div class="card-name">${t.name}</div>
      ${t.formClass ? `<div class="card-class">Class ${t.formClass}</div>` : ''}
      <div class="card-btn">Write a message ✏️</div>`;
    grid.appendChild(a);
  });
}

render(TEACHERS);
search.addEventListener('input', () => {
  const q = search.value.toLowerCase();
  render(TEACHERS.filter(t => t.name.toLowerCase().includes(q) || (t.formClass||'').toLowerCase().includes(q)));
});
