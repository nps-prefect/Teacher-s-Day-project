<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Messages — NPS Teachers' Day</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
<style>
:root { --gold:#FFD93D; --coral:#FF6B6B; --mint:#6BCB77; --sky:#4D96FF; --purple:#C77DFF; --bg:#FFF8ED; --text:#2D2D2D; --sub:#777; --card:#FFFFFF; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.top-bar { background:linear-gradient(135deg,#FFD93D,#FF6B6B); padding:18px 20px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
.top-bar-title { font-family:'Nunito',sans-serif; font-weight:900; color:#fff; font-size:1.1rem; text-shadow:0 1px 0 rgba(0,0,0,.1); }
.private-badge { text-decoration:none; background:rgba(255,255,255,.3); border-radius:50px; padding:6px 14px; font-weight:700; font-family:'Nunito',sans-serif; color:#fff; font-size:.78rem; white-space:nowrap; }
.teacher-hero { text-align:center; padding:36px 20px 24px; }
.teacher-avatar { width:110px; height:110px; border-radius:50%; background:#FFF0C2; display:flex; align-items:center; justify-content:center; font-size:3.5rem; margin:0 auto 16px; border:5px solid var(--gold); box-shadow:0 6px 0 rgba(0,0,0,.08); }
.teacher-name { font-family:'Nunito',sans-serif; font-size:clamp(1.6rem,5vw,2.2rem); font-weight:900; }
.teacher-class { color:var(--sub); font-weight:600; font-size:1rem; margin-top:4px; }
.teacher-tagline { margin-top:14px; font-size:1.05rem; color:var(--coral); font-weight:700; }
.lock-note { margin-top:10px; font-size:.85rem; color:var(--sub); font-weight:600; }
.stats-bar { max-width:600px; margin:0 auto; padding:0 16px 18px; display:flex; justify-content:center; }
.stats-pill { background:var(--card); border:2px solid #F0E8D8; border-radius:50px; padding:10px 22px; font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem; color:var(--text); box-shadow:0 3px 0 rgba(0,0,0,.05); }
.stats-pill span { color:var(--coral); }
.section-label { text-align:center; font-family:'Nunito',sans-serif; font-weight:900; font-size:1.15rem; color:var(--text); padding:0 20px 16px; }
.refresh-row { display:flex; justify-content:center; padding-bottom:16px; }
.refresh-btn { background:#fff; border:2px solid var(--gold); color:var(--text); font-family:'Nunito',sans-serif; font-weight:800; font-size:.85rem; padding:8px 18px; border-radius:50px; cursor:pointer; transition:transform .1s; }
.refresh-btn:hover { transform:translateY(-1px); }
.refresh-btn:disabled { opacity:.6; cursor:not-allowed; }
.comments-section { max-width:600px; margin:0 auto; padding:0 16px 60px; }
.comments-wall { display:flex; flex-direction:column; gap:14px; max-height:620px; overflow-y:auto; padding:4px 2px 4px 0; scrollbar-width:thin; scrollbar-color:var(--gold) transparent; }
.comments-wall::-webkit-scrollbar { width:6px; }
.comments-wall::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; }
.comment-bubble { background:var(--card); border-radius:16px; padding:16px 18px; box-shadow:0 3px 0 rgba(0,0,0,.05); border-left:4px solid var(--gold); animation:popIn .3s ease; }
@keyframes popIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.comment-bubble:nth-child(4n+2) { border-color:var(--coral); }
.comment-bubble:nth-child(4n+3) { border-color:var(--mint); }
.comment-bubble:nth-child(4n+4) { border-color:var(--sky); }
.comment-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.comment-author { font-family:'Nunito',sans-serif; font-weight:900; font-size:.95rem; }
.comment-time { font-size:.75rem; color:var(--sub); }
.comment-text { font-size:.97rem; line-height:1.55; color:var(--text); }
.no-comments { text-align:center; color:var(--sub); padding:30px 0; font-size:1rem; }
.no-comments small { display:block; margin-top:6px; }
.not-found { text-align:center; padding:60px 20px; }
.not-found h2 { font-family:'Nunito',sans-serif; font-size:1.8rem; font-weight:900; margin-bottom:12px; }
.loading-msg { text-align:center; color:var(--sub); padding:30px 0; font-size:1rem; }
.footer-note { text-align:center; color:var(--sub); font-size:.8rem; padding:0 20px 30px; }
</style>

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const teacher = TEACHERS.find(t => t.id === id);
const content = document.getElementById('pageContent');

function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

if (!teacher) {
  content.innerHTML = `
  <div class="not-found">
    <div style="font-size:4rem">😕</div>
    <h2>Page not found</h2>
    <p style="color:var(--sub);margin-bottom:24px">We couldn't find that teacher. Please check the link.</p>
  </div>`;
} else {
  document.title = `${teacher.name}'s Messages 💌`;
  document.getElementById('topTitle').textContent = teacher.name + ' 💌';
  content.innerHTML = `
  <div class="teacher-hero">
    <div class="teacher-avatar">${teacher.emoji}</div>
    <div class="teacher-name">${escH(teacher.name)}</div>
    ${teacher.formClass ? `<div class="teacher-class">Form Class ${escH(teacher.formClass)}</div>` : ''}
    <div class="teacher-tagline">✨ Here's what your students wrote for you ✨</div>
    <div class="lock-note">🔒 This link is private — only you can see these messages</div>
  </div>
  <div class="stats-bar"><div class="stats-pill" id="statsPill">Loading messages…</div></div>
  <div class="section-label">💬 Messages for ${escH(teacher.name)}</div>
  <div class="refresh-row"><button class="refresh-btn" id="refreshBtn" onclick="loadComments()">🔄 Refresh</button></div>
  <div class="comments-section">
    <div class="comments-wall" id="commentsWall">
      <div class="loading-msg">Loading messages… ⏳</div>
    </div>
  </div>
  <div class="footer-note">Made with ❤️ for Teachers' Day — NPS</div>`;
  loadComments();
}

let allComments = [];

function updateStats() {
  const pill = document.getElementById('statsPill');
  if (!pill) return;
  const n = allComments.length;
  pill.innerHTML = n === 0
    ? `No messages yet`
    : `<span>${n}</span> message${n === 1 ? '' : 's'} of appreciation 💛`;
}

async function loadComments() {
  const wall = document.getElementById('commentsWall');
  const btn = document.getElementById('refreshBtn');
  if (!wall) return;
  if (btn) { btn.disabled = true; btn.textContent = '🔄 Refreshing…'; }

  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    wall.innerHTML = '<div class="no-comments">No messages yet — connect Google Sheets to start collecting messages! 🌟<br><small style="color:#bbb">(Set up the Google Apps Script backend to load real messages here)</small></div>';
    allComments = [];
    updateStats();
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Refresh'; }
    return;
  }

  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=get&teacherId=${teacher.id}`);
    const data = await res.json();
    allComments = data.comments || [];
    wall.innerHTML = '';
    if (!allComments.length) {
      wall.innerHTML = '<div class="no-comments">No messages yet — check back soon! 🌟</div>';
    } else {
      allComments
        .slice()
        .sort((a, b) => new Date(b.time || 0) - new Date(a.time || 0))
        .forEach(c => addCommentToWall(c));
    }
    updateStats();
  } catch (e) {
    wall.innerHTML = '<div class="no-comments">Couldn\'t load messages right now. Please try refreshing. 😓</div>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Refresh'; }
  }
}

function addCommentToWall(comment) {
  const wall = document.getElementById('commentsWall');
  if (!wall) return;
  const date = comment.time ? new Date(comment.time).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'}) : '';
  const div = document.createElement('div');
  div.className = 'comment-bubble';
  div.innerHTML = `
    <div class="comment-meta">
      <div class="comment-author">💛 ${escH(comment.name)}</div>
      <div class="comment-time">${date}</div>
    </div>
    <div class="comment-text">${escH(comment.message)}</div>`;
  wall.appendChild(div);
}
